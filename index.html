<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Open All Hours POS</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
    body {
        font-family: "Georgia", serif;
        background: #f4e7c1;
        margin: 0;
        padding: 0;
        color: #3b2f1c;
    }

    header {
        background: #b5651d;
        color: #fff8e7;
        padding: 1rem 1.5rem;
        border-bottom: 6px solid #7a4a12;
        box-shadow: 0 4px 0 #d9c49a inset;
    }

    header h1 {
        margin: 0;
        font-size: 2rem;
        letter-spacing: 1px;
        text-shadow: 1px 1px 0 #7a4a12;
    }

    header p {
        margin: 0.3rem 0 0;
        font-size: 1rem;
        opacity: 0.9;
    }

    main {
        display: flex;
        flex-wrap: wrap;
        padding: 1rem;
        gap: 1rem;
    }

    section {
        background: #fff8e7;
        border: 3px solid #c9a46a;
        border-radius: 8px;
        padding: 1rem;
        flex: 1 1 320px;
        min-width: 280px;
        box-shadow: 0 0 6px rgba(0,0,0,0.1);
    }

    h2 {
        margin-top: 0;
        font-size: 1.3rem;
        border-bottom: 2px solid #c9a46a;
        padding-bottom: 0.4rem;
        color: #7a4a12;
        text-shadow: 1px 1px 0 #f4e7c1;
    }

    .item-list table {
        width: 100%;
        border-collapse: collapse;
        font-size: 1rem;
    }

    .item-list th, .item-list td {
        padding: 0.4rem;
        border-bottom: 1px solid #d9c49a;
    }

    .item-list th {
        text-align: left;
        color: #7a4a12;
    }

    .qty-input {
        width: 3rem;
        text-align: center;
        background: #fdf5e6;
        border: 2px solid #c9a46a;
        color: #3b2f1c;
        border-radius: 4px;
    }

    label {
        font-weight: bold;
        color: #7a4a12;
    }

    input[type="text"], select {
        width: 100%;
        padding: 0.4rem;
        border-radius: 4px;
        border: 2px solid #c9a46a;
        background: #fdf5e6;
        color: #3b2f1c;
    }

    .payment-options {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 0.4rem;
        margin-top: 0.4rem;
    }

    .payment-options label {
        display: flex;
        align-items: center;
        gap: 0.3rem;
        padding: 0.4rem;
        border-radius: 6px;
        border: 2px solid #c9a46a;
        cursor: pointer;
        background: #fdf5e6;
    }

    .summary-line {
        display: flex;
        justify-content: space-between;
        margin-bottom: 0.3rem;
        font-size: 1rem;
    }

    .btn {
        display: inline-block;
        padding: 0.6rem 1rem;
        border-radius: 6px;
        border: none;
        cursor: pointer;
        font-size: 1rem;
        font-weight: bold;
        margin-right: 0.4rem;
    }

    .btn-primary {
        background: #b5651d;
        color: #fff8e7;
        border: 2px solid #7a4a12;
    }

    .btn-secondary {
        background: #d9c49a;
        color: #3b2f1c;
        border: 2px solid #7a4a12;
    }

    .log-output {
        font-size: 0.9rem;
        background: #fdf5e6;
        border-radius: 6px;
        border: 2px solid #c9a46a;
        padding: 0.5rem;
        max-height: 160px;
        overflow: auto;
        white-space: pre-wrap;
        margin-top: 0.6rem;
    }
</style>
</head>

<body>

<header>
    <h1>Open All Hours — POS System</h1>
    <p>Proper corner‑shop ordering, just like Arkwright would’ve wanted</p>
</header>

<main>

    <!-- ITEMS -->
    <section class="item-list">
        <h2>Shop Stock</h2>
        <table>
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Price (£)</th>
                    <th>Qty</th>
                </tr>
            </thead>
            <tbody>
                <tr data-item="Pepsi Max" data-price="0.7">
                    <td>Pepsi Max</td>
                    <td>0.70</td>
                    <td><input class="qty-input" type="number" min="0" value="0"></td>
                </tr>
                <tr data-item="Dr Pepper" data-price="0.7">
                    <td>Dr Pepper</td>
                    <td>0.70</td>
                    <td><input class="qty-input" type="number" min="0" value="0"></td>
                </tr>
                <tr data-item="Coca-Cola" data-price="1.1">
                    <td>Coca-Cola</td>
                    <td>1.10</td>
                    <td><input class="qty-input" type="number" min="0" value="0"></td>
                </tr>
                <tr data-item="Twirl" data-price="0.6">
                    <td>Twirl</td>
                    <td>0.60</td>
                    <td><input class="qty-input" type="number" min="0" value="0"></td>
                </tr>
                <tr data-item="Pot Noodle" data-price="1.0">
                    <td>Pot Noodle (Chicken & Mushroom)</td>
                    <td>1.00</td>
                    <td><input class="qty-input" type="number" min="0" value="0"></td>
                </tr>
            </tbody>
        </table>
    </section>

    <!-- CUSTOMER + PAYMENT -->
    <section>
        <h2>Customer & Payment</h2>

        <label for="customerName">Customer name</label>
        <input type="text" id="customerName" placeholder="e.g. Paul, Beth, Geoff">

        <p>
            <label>
                <input type="checkbox" id="isRegular">
                Regular customer (credit/debit rules apply)
            </label>
        </p>

        <label>Payment method</label>
        <div class="payment-options">
            <label><input type="radio" name="paymentMethod" value="monzo_link" checked> Monzo link</label>
            <label><input type="radio" name="paymentMethod" value="monzo_qr"> Monzo QR</label>
            <label><input type="radio" name="paymentMethod" value="cash"> Cash</label>
            <label><input type="radio" name="paymentMethod" value="bank_transfer"> Bank transfer</label>
            <label><input type="radio" name="paymentMethod" value="credit"> Credit</label>
            <label><input type="radio" name="paymentMethod" value="debit"> Debit</label>
        </div>
    </section>

    <!-- SUMMARY -->
    <section>
        <h2>Order Summary</h2>

        <div class="summary-line">
            <span>Total:</span>
            <span id="itemsTotal">£0.00</span>
        </div>

        <div class="summary-line">
            <span>Customer:</span>
            <span id="summaryCustomer">-</span>
        </div>

        <div class="summary-line">
            <span>Payment:</span>
            <span id="summaryPayment">Monzo link</span>
        </div>

        <button class="btn btn-secondary" id="updateSummaryBtn">Update summary</button>
        <button class="btn btn-primary" id="completeOrderBtn">Complete order</button>

        <div class="log-output" id="orderLog"></div>
    </section>

</main>

<script>
function getPaymentMethod() {
    const radios = document.querySelectorAll('input[name="paymentMethod"]');
    for (const r of radios) if (r.checked) return r.value;
    return "monzo_link";
}

function buildOrder() {
    const rows = document.querySelectorAll('.item-list tbody tr');
    const items = [];
    let total = 0;

    rows.forEach(row => {
        const qty = parseInt(row.querySelector('.qty-input').value || "0");
        if (qty > 0) {
            const name = row.dataset.item;
            const price = parseFloat(row.dataset.price);
            const lineTotal = qty * price;
            total += lineTotal;
            items.push({ item: name, qty, price, lineTotal });
        }
    });

    return {
        timestamp: new Date().toISOString(),
        customer: document.getElementById('customerName').value.trim(),
        isRegular: document.getElementById('isRegular').checked,
        paymentMethod: getPaymentMethod(),
        items,
        total
    };
}

function updateSummary() {
    const order = buildOrder();
    document.getElementById('itemsTotal').textContent = "£" + order.total.toFixed(2);
    document.getElementById('summaryCustomer').textContent = order.customer || "-";
    document.getElementById('summaryPayment').textContent = order.paymentMethod;
}

document.getElementById('updateSummaryBtn').onclick = updateSummary;

document.getElementById('completeOrderBtn').onclick = () => {
    const order = buildOrder();
    updateSummary();
    document.getElementById('orderLog').textContent = JSON.stringify(order, null, 2);
};
</script>

</body>
</html>
