<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Open All Hours — Regulars Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
    body {
        font-family: "Georgia", serif;
        background: #f4e7c1;
        margin: 0;
        padding: 0;
        color: #3b2f1c;
    }

    header {
        background: #b5651d;
        color: #fff8e7;
        padding: 1rem 1.5rem;
        border-bottom: 6px solid #7a4a12;
        box-shadow: 0 4px 0 #d9c49a inset;
    }

    header h1 {
        margin: 0;
        font-size: 2rem;
        letter-spacing: 1px;
        text-shadow: 1px 1px 0 #7a4a12;
    }

    header p {
        margin: 0.3rem 0 0;
        font-size: 1rem;
        opacity: 0.9;
    }

    main {
        padding: 1rem;
    }

    .regular-card {
        background: #fff8e7;
        border: 3px solid #c9a46a;
        border-radius: 8px;
        padding: 1rem;
        margin-bottom: 1rem;
        box-shadow: 0 0 6px rgba(0,0,0,0.1);
    }

    .regular-card h2 {
        margin-top: 0;
        font-size: 1.4rem;
        color: #7a4a12;
        border-bottom: 2px solid #c9a46a;
        padding-bottom: 0.3rem;
    }

    .info-line {
        margin: 0.3rem 0;
        font-size: 1rem;
    }

    .balance {
        font-weight: bold;
        color: #7a4a12;
    }

    .btn {
        display: inline-block;
        padding: 0.5rem 0.9rem;
        border-radius: 6px;
        border: none;
        cursor: pointer;
        font-size: 0.9rem;
        font-weight: bold;
        margin-right: 0.4rem;
        margin-top: 0.4rem;
    }

    .btn-add {
        background: #b5651d;
        color: #fff8e7;
        border: 2px solid #7a4a12;
    }

    .btn-remove {
        background: #d9534f;
        color: #fff;
        border: 2px solid #7a4a12;
    }

    .btn-save {
        background: #5cb85c;
        color: #fff;
        border: 2px solid #3b2f1c;
        margin-top: 1rem;
    }

    .btn-note {
        background: #d9c49a;
        color: #3b2f1c;
        border: 2px solid #7a4a12;
    }

    .new-regular {
        background: #fff8e7;
        border: 3px solid #c9a46a;
        padding: 1rem;
        border-radius: 8px;
        margin-top: 2rem;
    }

    input[type="text"], textarea {
        width: 100%;
        padding: 0.4rem;
        border-radius: 4px;
        border: 2px solid #c9a46a;
        background: #fdf5e6;
        color: #3b2f1c;
        margin-bottom: 0.6rem;
    }

    textarea {
        height: 80px;
        resize: vertical;
    }

    .log-output {
        font-size: 0.9rem;
        background: #fdf5e6;
        border-radius: 6px;
        border: 2px solid #c9a46a;
        padding: 0.5rem;
        max-height: 200px;
        overflow: auto;
        white-space: pre-wrap;
        margin-top: 1rem;
    }
</style>
</head>

<body>

<header>
    <h1>Open All Hours — Regulars Admin</h1>
    <p>Manage credit, debit, balances, notes & trusted customers</p>
</header>

<main>

    <div id="regularsContainer">
        <!-- Regulars will be loaded here by admin.js -->
    </div>

    <button class="btn btn-save" id="saveChangesBtn">Save All Changes</button>

    <div class="new-regular">
        <h2>Add New Regular</h2>
        <input type="text" id="newName" placeholder="Name">
        <input type="text" id="newPayment" placeholder="auto_payment (credit/debit)">
        <input type="text" id="newBalance" placeholder="Starting balance (e.g. 0)">
        <textarea id="newNotes" placeholder="Notes"></textarea>
        <button class="btn btn-add" id="addRegularBtn">Add Regular</button>
    </div>

    <div class="log-output" id="adminLog"></div>

</main>

<script src="admin.js"></script>

</body>
</html>
