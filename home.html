<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Open All Hours — Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
    body {
        font-family: "Georgia", serif;
        background: #f4e7c1;
        margin: 0;
        padding: 0;
        color: #3b2f1c;
    }

    header {
        background: #b5651d;
        color: #fff8e7;
        padding: 1.5rem;
        border-bottom: 6px solid #7a4a12;
        text-align: center;
        box-shadow: 0 4px 0 #d9c49a inset;
    }

    header h1 {
        margin: 0;
        font-size: 2.4rem;
        letter-spacing: 1px;
        text-shadow: 1px 1px 0 #7a4a12;
    }

    main {
        padding: 1.5rem;
    }

    .section {
        background: #fff8e7;
        border: 3px solid #c9a46a;
        border-radius: 8px;
        padding: 1rem;
        margin-bottom: 1.5rem;
        box-shadow: 0 0 6px rgba(0,0,0,0.1);
    }

    .section h2 {
        margin-top: 0;
        font-size: 1.4rem;
        color: #7a4a12;
        border-bottom: 2px solid #c9a46a;
        padding-bottom: 0.3rem;
    }

    .link-btn {
        display: block;
        background: #b5651d;
        color: #fff8e7;
        border: 2px solid #7a4a12;
        padding: 0.8rem;
        margin: 0.5rem 0;
        text-align: center;
        border-radius: 6px;
        font-size: 1.1rem;
        text-decoration: none;
        font-weight: bold;
    }

    .private-links {
        display: none;
        margin-top: 1rem;
    }

    #unlockBox {
        margin-top: 1rem;
        padding: 1rem;
        background: #fdf5e6;
        border: 2px solid #c9a46a;
        border-radius: 6px;
    }

    #unlockBox input {
        width: 100%;
        padding: 0.6rem;
        border-radius: 6px;
        border: 2px solid #c9a46a;
        background: #fff8e7;
        margin-bottom: 0.6rem;
        font-size: 1rem;
    }

    #unlockBox button {
        width: 100%;
        padding: 0.7rem;
        background: #7a4a12;
        color: #fff8e7;
        border: 2px solid #3b2f1c;
        border-radius: 6px;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
    }

    #unlockMessage {
        margin-top: 0.5rem;
        color: #7a4a12;
        font-weight: bold;
    }

    #hideStaffBtn {
        display: none;
        background: #d9534f;
        color: #fff;
        border: 2px solid #7a4a12;
        padding: 0.7rem;
        margin-top: 1rem;
        text-align: center;
        border-radius: 6px;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
    }
</style>
</head>

<body>

<header>
    <h1>Open All Hours — Home</h1>
</header>

<main>

    <!-- PUBLIC SECTION -->
    <div class="section">
        <h2>Public Access</h2>

        <a class="link-btn" href="index.html">Place an Order</a>
        <a class="link-btn" href="stock.json">View Stock</a>
        <a class="link-btn" href="#">About Open All Hours</a>
    </div>

    <!-- PRIVATE SECTION -->
    <div class="section">
        <h2>Staff Access</h2>

        <div id="unlockBox">
            <input type="password" id="passcodeInput" placeholder="Enter staff passcode">
            <button onclick="unlock()">Unlock</button>
            <div id="unlockMessage"></div>
        </div>

        <div class="private-links" id="privateLinks">
            <a class="link-btn" href="admin.html">Admin Panel</a>
            <a class="link-btn" href="dashboard.html">Financial Dashboard</a>
            <a class="link-btn" href="regulars.json">Regulars File</a>
            <a class="link-btn" href="sales.json">Sales Log</a>
            <a class="link-btn" href="stock.json">Stock File</a>
        </div>

        <button id="hideStaffBtn" onclick="hideStaff()">Hide Staff Tools</button>
    </div>

</main>

<script>
    const STAFF_PASSCODE = "openallhours5010"; // CHANGE THIS ANYTIME

    function unlock() {
        const input = document.getElementById("passcodeInput").value.trim();
        const msg = document.getElementById("unlockMessage");

        if (input === STAFF_PASSCODE) {
            document.getElementById("privateLinks").style.display = "block";
            document.getElementById("hideStaffBtn").style.display = "block";
            msg.textContent = "Staff mode unlocked.";
        } else {
            msg.textContent = "Incorrect passcode.";
        }
    }

    function hideStaff() {
        document.getElementById("privateLinks").style.display = "none";
        document.getElementById("hideStaffBtn").style.display = "none";
        document.getElementById("unlockMessage").textContent = "Staff tools hidden.";
    }
</script>

</body>
</html>
